services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: joot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: joot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://joot:${POSTGRES_PASSWORD}@postgres:5432/joot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No host port — only reachable via nginx within the Docker network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    # No host port — only reachable via nginx within the Docker network

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-Joot Leave <noreply@joot.local>}
      APP_URL: ${APP_URL:-${BETTER_AUTH_URL}}
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "4000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

  # One-shot seed runner — not started by default.
  # Usage: docker compose --profile tools run --rm seed
  seed:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    entrypoint: ["node", "dist/seed.js"]
    environment:
      DATABASE_URL: postgresql://joot:${POSTGRES_PASSWORD}@postgres:5432/joot
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-System Admin}
      HOLDING_COMPANY_NAME: ${HOLDING_COMPANY_NAME:-Joot Holdings}
      SUBSIDIARY_NAME: ${SUBSIDIARY_NAME:-Main Subsidiary}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - tools

  # One-shot migration runner — not started by default.
  # Usage: docker compose --profile tools run --rm migrate
  migrate:
    image: node:22-alpine
    working_dir: /app
    entrypoint: >
      sh -c "npm install -g prisma@6 --quiet &&
             prisma migrate dev --schema=/app/prisma/schema.prisma --name $$MIGRATION_NAME"
    environment:
      # Uses internal Docker network — postgres resolves to the postgres container
      DATABASE_URL: postgresql://joot:${POSTGRES_PASSWORD}@postgres:5432/joot
      MIGRATION_NAME: ${MIGRATION_NAME:-init}
    volumes:
      # Mount the prisma directory so generated migration files land on the host
      - ./packages/db/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
